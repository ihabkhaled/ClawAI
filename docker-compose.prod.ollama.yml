# =============================================================================
# docker-compose.prod.ollama.yml — Production Ollama LLM Runtime
# =============================================================================
# Contains: Ollama runtime with auto-pull of tinyllama model
# Requires: docker-compose.prod.databases.yml running first (claw-network must exist)
#
# Reads environment variables from the root .env file.
# Copy .env.example to .env before running.
#
# Usage:
#   docker compose -f docker-compose.prod.ollama.yml up -d
#   ./scripts/claw.sh --prod ollama:up
# =============================================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        # Start ollama serve in the background
        ollama serve &
        SERVE_PID=$$!

        # Wait for Ollama to be ready
        echo "Waiting for Ollama to start..."
        until ollama list > /dev/null 2>&1; do
          sleep 1
        done
        echo "Ollama is ready."

        # Auto-pull all required models (skips if already installed)
        for MODEL in tinyllama gemma3:4b gemma2:2b phi3:mini llama3.2:3b; do
          if ! ollama list | grep -q "$${MODEL%%:*}"; then
            echo "Pulling $$MODEL..."
            ollama pull $$MODEL
            echo "$$MODEL pulled successfully."
          else
            echo "$$MODEL already available."
          fi
        done

        echo "All models ready."

        # Keep the container running by waiting on the serve process
        wait $$SERVE_PID
    healthcheck:
      test: ['CMD-SHELL', 'ollama list > /dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - claw-network

volumes:
  ollama-data:

networks:
  claw-network:
    external: true
    name: claw-network
