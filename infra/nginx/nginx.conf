events {
    worker_connections 1024;
}

http {
    # --- Upstreams ---
    upstream auth_service    { server auth-service:4001; }
    upstream chat_service    { server chat-service:4002; }
    upstream connector_service { server connector-service:4003; }
    upstream routing_service { server routing-service:4004; }
    upstream memory_service  { server memory-service:4005; }
    upstream file_service    { server file-service:4006; }
    upstream audit_service   { server audit-service:4007; }
    upstream ollama_service  { server ollama-service:4008; }
    upstream health_service  { server health-service:4009; }

    # --- Timeouts ---
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # --- Request body ---
    client_max_body_size 50m;

    server {
        listen 80;
        server_name _;

        # --- Shared proxy headers (applied to all locations) ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        # --- Auth Service ---
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
        }

        location /api/v1/users/ {
            proxy_pass http://auth_service;
        }

        # --- Chat Service ---
        location /api/v1/chat/ {
            proxy_pass http://chat_service;
        }

        location /api/v1/threads/ {
            proxy_pass http://chat_service;
        }

        location /api/v1/messages/ {
            proxy_pass http://chat_service;
        }

        # --- Chat Streaming (WebSocket / SSE) ---
        location /api/v1/chat/stream {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_buffering off;
            proxy_cache off;
        }

        # --- Connector Service ---
        location /api/v1/connectors/ {
            proxy_pass http://connector_service;
        }

        location /api/v1/models/ {
            proxy_pass http://connector_service;
        }

        # --- Routing Service ---
        location /api/v1/routing/ {
            proxy_pass http://routing_service;
        }

        # --- Memory Service ---
        location /api/v1/memory/ {
            proxy_pass http://memory_service;
        }

        location /api/v1/context/ {
            proxy_pass http://memory_service;
        }

        # --- File Service ---
        location /api/v1/files/ {
            proxy_pass http://file_service;
        }

        # --- Audit Service ---
        location /api/v1/audits/ {
            proxy_pass http://audit_service;
        }

        location /api/v1/usage/ {
            proxy_pass http://audit_service;
        }

        # --- Ollama Service ---
        location /api/v1/ollama/ {
            proxy_pass http://ollama_service;
        }

        # --- Health Service ---
        location /api/v1/health {
            proxy_pass http://health_service;
        }
    }
}
