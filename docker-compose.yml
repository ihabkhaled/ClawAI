services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claw_secret}
      POSTGRES_DB: ${POSTGRES_DB:-claw}
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-claw}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  redis:
    image: redis:7-alpine
    container_name: claw-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Ollama — Local AI Runtime
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    profiles:
      - local-ai
      - gpu
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - claw-network

  ollama-gpu:
    image: ollama/ollama:latest
    container_name: claw-ollama-gpu
    restart: unless-stopped
    profiles:
      - gpu
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Backend Application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./apps/claw-backend
      dockerfile: Dockerfile
    container_name: claw-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-claw}:${POSTGRES_PASSWORD:-claw_secret}@postgres:5432/${POSTGRES_DB:-claw}?schema=public
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@claw.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-claw-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Backend Migrations + Seed (run once)
  # ---------------------------------------------------------------------------
  backend-migrate:
    build:
      context: ./apps/claw-backend
      dockerfile: Dockerfile
      target: builder
    container_name: claw-backend-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-claw}:${POSTGRES_PASSWORD:-claw_secret}@postgres:5432/${POSTGRES_DB:-claw}?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@claw.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-claw-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    command: >
      sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - claw-network
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Frontend Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/claw-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-4000}
    container_name: claw-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-4000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - claw-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    driver: local

networks:
  claw-network:
    driver: bridge
