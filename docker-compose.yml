# All services read environment variables from the root .env file.
# Copy .env.example to .env before running.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Instances (one per service that needs relational storage)
  # ---------------------------------------------------------------------------
  pg-auth:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_AUTH_USER:-claw}
      POSTGRES_PASSWORD: ${PG_AUTH_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_AUTH_DB:-claw_auth}
    ports:
      - '${PG_AUTH_PORT:-5441}:5432'
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_AUTH_USER:-claw} -d ${PG_AUTH_DB:-claw_auth}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-chat:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-chat
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_CHAT_USER:-claw}
      POSTGRES_PASSWORD: ${PG_CHAT_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_CHAT_DB:-claw_chat}
    ports:
      - '${PG_CHAT_PORT:-5442}:5432'
    volumes:
      - pg-chat-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_CHAT_USER:-claw} -d ${PG_CHAT_DB:-claw_chat}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-connector:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-connector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_CONNECTOR_USER:-claw}
      POSTGRES_PASSWORD: ${PG_CONNECTOR_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_CONNECTOR_DB:-claw_connectors}
    ports:
      - '${PG_CONNECTOR_PORT:-5443}:5432'
    volumes:
      - pg-connector-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${PG_CONNECTOR_USER:-claw} -d ${PG_CONNECTOR_DB:-claw_connectors}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-routing:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-routing
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_ROUTING_USER:-claw}
      POSTGRES_PASSWORD: ${PG_ROUTING_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_ROUTING_DB:-claw_routing}
    ports:
      - '${PG_ROUTING_PORT:-5444}:5432'
    volumes:
      - pg-routing-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${PG_ROUTING_USER:-claw} -d ${PG_ROUTING_DB:-claw_routing}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-memory:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-memory
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_MEMORY_USER:-claw}
      POSTGRES_PASSWORD: ${PG_MEMORY_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_MEMORY_DB:-claw_memory}
    ports:
      - '${PG_MEMORY_PORT:-5445}:5432'
    volumes:
      - pg-memory-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_MEMORY_USER:-claw} -d ${PG_MEMORY_DB:-claw_memory}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-files:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-files
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_FILES_USER:-claw}
      POSTGRES_PASSWORD: ${PG_FILES_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_FILES_DB:-claw_files}
    ports:
      - '${PG_FILES_PORT:-5446}:5432'
    volumes:
      - pg-files-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_FILES_USER:-claw} -d ${PG_FILES_DB:-claw_files}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  pg-ollama:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-ollama
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_OLLAMA_USER:-claw}
      POSTGRES_PASSWORD: ${PG_OLLAMA_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_OLLAMA_DB:-claw_ollama}
    ports:
      - '${PG_OLLAMA_PORT:-5447}:5432'
    volumes:
      - pg-ollama-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_OLLAMA_USER:-claw} -d ${PG_OLLAMA_DB:-claw_ollama}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # PostgreSQL (Image Service)
  # ---------------------------------------------------------------------------
  # PostgreSQL (File Generation Service)
  # ---------------------------------------------------------------------------
  pg-file-generations:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-file-generations
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_FILE_GENERATIONS_USER:-claw}
      POSTGRES_PASSWORD: ${PG_FILE_GENERATIONS_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_FILE_GENERATIONS_DB:-claw_file_generations}
    ports:
      - '${PG_FILE_GENERATIONS_PORT:-5449}:5432'
    volumes:
      - pg-file-generations-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${PG_FILE_GENERATIONS_USER:-claw} -d ${PG_FILE_GENERATIONS_DB:-claw_file_generations}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  pg-images:
    image: pgvector/pgvector:pg16
    container_name: claw-pg-images
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_IMAGES_USER:-claw}
      POSTGRES_PASSWORD: ${PG_IMAGES_PASSWORD:-claw_secret}
      POSTGRES_DB: ${PG_IMAGES_DB:-claw_images}
    ports:
      - '${PG_IMAGES_PORT:-5448}:5432'
    volumes:
      - pg-images-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_IMAGES_USER:-claw} -d ${PG_IMAGES_DB:-claw_images}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # MongoDB (Audit Service)
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: claw-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-claw}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-claw_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-claw_audit}
    ports:
      - '${MONGO_PORT:-27018}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand("ping").ok', '--quiet']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: claw-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6380}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # RabbitMQ
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: claw-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-claw}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-claw_secret}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD-SHELL', 'rabbitmq-diagnostics -q check_running']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Ollama — Local AI Runtime
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        ollama serve &
        SERVE_PID=$$!
        echo "Waiting for Ollama to start..."
        until ollama list > /dev/null 2>&1; do sleep 1; done
        echo "Ollama is ready."
        # Auto-pull models (configurable via AUTO_PULL_MODELS env var)
        DEFAULT_MODELS="tinyllama gemma3:4b gemma2:2b phi3:mini llama3.2:3b"
        MODELS_TO_PULL="$${AUTO_PULL_MODELS:-$$DEFAULT_MODELS}"
        for MODEL in $$MODELS_TO_PULL; do
          if ! ollama list | grep -q "$${MODEL%%:*}"; then
            echo "Pulling $$MODEL..."
            ollama pull $$MODEL
            echo "$$MODEL pulled successfully."
          else
            echo "$$MODEL already available."
          fi
        done

        echo "All models ready."
        wait $$SERVE_PID
    healthcheck:
      test: ['CMD-SHELL', 'ollama list > /dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: apps/claw-auth-service/Dockerfile
    container_name: claw-auth-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4001:4001'
    depends_on:
      pg-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  chat-service:
    build:
      context: .
      dockerfile: apps/claw-chat-service/Dockerfile
    container_name: claw-chat-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4002:4002'
    depends_on:
      pg-chat:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4002/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  connector-service:
    build:
      context: .
      dockerfile: apps/claw-connector-service/Dockerfile
    container_name: claw-connector-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4003:4003'
    depends_on:
      pg-connector:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4003/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  routing-service:
    build:
      context: .
      dockerfile: apps/claw-routing-service/Dockerfile
    container_name: claw-routing-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4004:4004'
    depends_on:
      pg-routing:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4004/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  memory-service:
    build:
      context: .
      dockerfile: apps/claw-memory-service/Dockerfile
    container_name: claw-memory-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4005:4005'
    depends_on:
      pg-memory:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4005/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  file-service:
    build:
      context: .
      dockerfile: apps/claw-file-service/Dockerfile
    container_name: claw-file-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4006:4006'
    volumes:
      - file-storage-data:/data/files
    depends_on:
      pg-files:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4006/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  audit-service:
    build:
      context: .
      dockerfile: apps/claw-audit-service/Dockerfile
    container_name: claw-audit-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4007:4007'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4007/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  ollama-service:
    build:
      context: .
      dockerfile: apps/claw-ollama-service/Dockerfile
    container_name: claw-ollama-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4008:4008'
    depends_on:
      pg-ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4008/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  file-generation-service:
    build:
      context: .
      dockerfile: apps/claw-file-generation-service/Dockerfile
    container_name: claw-file-generation-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4013:4013'
    depends_on:
      pg-file-generations:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4013/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  image-service:
    build:
      context: .
      dockerfile: apps/claw-image-service/Dockerfile
    container_name: claw-image-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4012:4012'
    depends_on:
      pg-images:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4012/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  client-logs-service:
    build:
      context: .
      dockerfile: apps/claw-client-logs-service/Dockerfile
    container_name: claw-client-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4010:4010'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4010/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  server-logs-service:
    build:
      context: .
      dockerfile: apps/claw-server-logs-service/Dockerfile
    container_name: claw-server-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4011:4011'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4011/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  health-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-health-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4009:4009'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4009/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: claw-nginx
    restart: unless-stopped
    ports:
      - '4000:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      connector-service:
        condition: service_healthy
      routing-service:
        condition: service_healthy
      memory-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      ollama-service:
        condition: service_healthy
      client-logs-service:
        condition: service_healthy
      server-logs-service:
        condition: service_healthy
      health-service:
        condition: service_healthy
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/claw-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: claw-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - nginx
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # ClamAV (Antivirus file scanning)
  # ---------------------------------------------------------------------------
  clamav:
    image: clamav/clamav:stable
    container_name: claw-clamav
    restart: unless-stopped
    ports:
      - '${CLAMAV_PORT:-3310}:3310'
    volumes:
      - clamav-data:/var/lib/clamav
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    healthcheck:
      test: ['CMD-SHELL', 'clamdcheck || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - claw-network

volumes:
  pg-auth-data:
    driver: local
  pg-chat-data:
    driver: local
  pg-connector-data:
    driver: local
  pg-routing-data:
    driver: local
  pg-memory-data:
    driver: local
  pg-files-data:
    driver: local
  pg-ollama-data:
    driver: local
  pg-images-data:
    driver: local
  pg-file-generations-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  ollama-data:
    driver: local
  file-storage-data:
    driver: local
  clamav-data:
    driver: local

networks:
  claw-network:
    driver: bridge
    name: claw-network
