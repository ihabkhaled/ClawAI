# docker-compose.services.yml — Backend microservices + Frontend + Nginx
# Usage: docker compose -f docker-compose.services.yml up -d
# Usage: ./scripts/claw.sh services:up
# Requires: docker-compose.databases.yml running first (claw-network must exist)
# All services read environment variables from the root .env file.
# Copy .env.example to .env before running.

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: claw-nginx
    restart: unless-stopped
    ports:
      - '4000:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      connector-service:
        condition: service_healthy
      routing-service:
        condition: service_healthy
      memory-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      ollama-service:
        condition: service_healthy
      client-logs-service:
        condition: service_healthy
      server-logs-service:
        condition: service_healthy
      health-service:
        condition: service_healthy
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Backend Microservices (DEV mode — hot-reload via volume mounts)
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: apps/claw-auth-service/Dockerfile.dev
    container_name: claw-auth-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4001:4001'
    volumes:
      - ./apps/claw-auth-service/src:/app/apps/claw-auth-service/src
      - ./apps/claw-auth-service/prisma:/app/apps/claw-auth-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  chat-service:
    build:
      context: .
      dockerfile: apps/claw-chat-service/Dockerfile.dev
    container_name: claw-chat-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4002:4002'
    volumes:
      - ./apps/claw-chat-service/src:/app/apps/claw-chat-service/src
      - ./apps/claw-chat-service/prisma:/app/apps/claw-chat-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4002/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  connector-service:
    build:
      context: .
      dockerfile: apps/claw-connector-service/Dockerfile.dev
    container_name: claw-connector-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4003:4003'
    volumes:
      - ./apps/claw-connector-service/src:/app/apps/claw-connector-service/src
      - ./apps/claw-connector-service/prisma:/app/apps/claw-connector-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4003/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  routing-service:
    build:
      context: .
      dockerfile: apps/claw-routing-service/Dockerfile.dev
    container_name: claw-routing-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4004:4004'
    volumes:
      - ./apps/claw-routing-service/src:/app/apps/claw-routing-service/src
      - ./apps/claw-routing-service/prisma:/app/apps/claw-routing-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4004/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  memory-service:
    build:
      context: .
      dockerfile: apps/claw-memory-service/Dockerfile.dev
    container_name: claw-memory-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4005:4005'
    volumes:
      - ./apps/claw-memory-service/src:/app/apps/claw-memory-service/src
      - ./apps/claw-memory-service/prisma:/app/apps/claw-memory-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4005/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  file-service:
    build:
      context: .
      dockerfile: apps/claw-file-service/Dockerfile.dev
    container_name: claw-file-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4006:4006'
    volumes:
      - ./apps/claw-file-service/src:/app/apps/claw-file-service/src
      - ./apps/claw-file-service/prisma:/app/apps/claw-file-service/prisma
      - file-storage-data:/data/files
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4006/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  audit-service:
    build:
      context: .
      dockerfile: apps/claw-audit-service/Dockerfile.dev
    container_name: claw-audit-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4007:4007'
    volumes:
      - ./apps/claw-audit-service/src:/app/apps/claw-audit-service/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4007/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  ollama-service:
    build:
      context: .
      dockerfile: apps/claw-ollama-service/Dockerfile.dev
    container_name: claw-ollama-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4008:4008'
    volumes:
      - ./apps/claw-ollama-service/src:/app/apps/claw-ollama-service/src
      - ./apps/claw-ollama-service/prisma:/app/apps/claw-ollama-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4008/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  client-logs-service:
    build:
      context: .
      dockerfile: apps/claw-client-logs-service/Dockerfile.dev
    container_name: claw-client-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4010:4010'
    volumes:
      - ./apps/claw-client-logs-service/src:/app/apps/claw-client-logs-service/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4010/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  server-logs-service:
    build:
      context: .
      dockerfile: apps/claw-server-logs-service/Dockerfile.dev
    container_name: claw-server-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4011:4011'
    volumes:
      - ./apps/claw-server-logs-service/src:/app/apps/claw-server-logs-service/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4011/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  health-service:
    build:
      context: .
      dockerfile: apps/claw-health-service/Dockerfile.dev
    container_name: claw-health-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4009:4009'
    volumes:
      - ./apps/claw-health-service/src:/app/apps/claw-health-service/src
    command: npm run dev
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4009/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Frontend (DEV mode — hot-reload with Turbopack)
  # ---------------------------------------------------------------------------
  file-generation-service:
    build:
      context: .
      dockerfile: apps/claw-file-generation-service/Dockerfile.dev
    container_name: claw-file-generation-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4013:4013'
    volumes:
      - ./apps/claw-file-generation-service/src:/app/apps/claw-file-generation-service/src
      - ./apps/claw-file-generation-service/prisma:/app/apps/claw-file-generation-service/prisma
    command: ['./docker-entrypoint.dev.sh']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4013/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/claw-frontend
      dockerfile: Dockerfile.dev
    container_name: claw-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./apps/claw-frontend/src:/app/src
      - ./apps/claw-frontend/public:/app/public
    command: npm run dev
    depends_on:
      nginx:
        condition: service_started
    networks:
      - claw-network

volumes:
  file-storage-data:

networks:
  claw-network:
    external: true
    name: claw-network
