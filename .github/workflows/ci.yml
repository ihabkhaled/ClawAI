name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared packages
        run: |
          cd packages/shared-types && npx tsc
          cd ../shared-constants && npx tsc
          cd ../shared-rabbitmq && npx tsc
          cd ../shared-auth && npx tsc

      - name: Generate Prisma clients
        run: |
          for svc in auth chat connector routing memory file ollama image; do
            cd apps/claw-${svc}-service && npx prisma generate && cd ../..
          done

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared packages
        run: |
          cd packages/shared-types && npx tsc
          cd ../shared-constants && npx tsc
          cd ../shared-rabbitmq && npx tsc
          cd ../shared-auth && npx tsc

      - name: Generate Prisma clients
        run: |
          for svc in auth chat connector routing memory file ollama image; do
            cd apps/claw-${svc}-service && npx prisma generate && cd ../..
          done

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared packages
        run: |
          cd packages/shared-types && npx tsc
          cd ../shared-constants && npx tsc
          cd ../shared-rabbitmq && npx tsc
          cd ../shared-auth && npx tsc

      - name: Generate Prisma clients
        run: |
          for svc in auth chat connector routing memory file ollama image; do
            cd apps/claw-${svc}-service && npx prisma generate && cd ../..
          done

      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          # Provide minimal env vars for services that validate config on import
          OLLAMA_DATABASE_URL: postgresql://test:test@localhost:5432/test
          OLLAMA_BASE_URL: http://localhost:11434
          IMAGE_DATABASE_URL: postgresql://test:test@localhost:5432/test
          FILE_SERVICE_URL: http://localhost:4006
          CONNECTOR_SERVICE_URL: http://localhost:4003
          STABLE_DIFFUSION_URL: http://localhost:7860
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: ci-test-jwt-secret-9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared packages
        run: |
          cd packages/shared-types && npx tsc
          cd ../shared-constants && npx tsc
          cd ../shared-rabbitmq && npx tsc
          cd ../shared-auth && npx tsc

      - name: Generate Prisma clients
        run: |
          for svc in auth chat connector routing memory file ollama image; do
            cd apps/claw-${svc}-service && npx prisma generate && cd ../..
          done

      - name: Build all services
        run: npm run build
