# =============================================================================
# docker-compose.prod.services.yml — Production Backend & Frontend Services
# =============================================================================
# Contains: All NestJS microservices, Nginx reverse proxy, Next.js frontend
# Requires: docker-compose.prod.databases.yml running first (claw-network must exist)
# Uses production Dockerfiles (not Dockerfile.dev), no source volume mounts.
#
# All services read environment variables from the root .env file.
# Copy .env.example to .env before running.
#
# Usage:
#   docker compose -f docker-compose.prod.services.yml up -d
#   ./scripts/claw.sh --prod services:up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: apps/claw-auth-service/Dockerfile
    container_name: claw-auth-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4001:4001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  chat-service:
    build:
      context: .
      dockerfile: apps/claw-chat-service/Dockerfile
    container_name: claw-chat-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4002:4002'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4002/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  connector-service:
    build:
      context: .
      dockerfile: apps/claw-connector-service/Dockerfile
    container_name: claw-connector-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4003:4003'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4003/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  routing-service:
    build:
      context: .
      dockerfile: apps/claw-routing-service/Dockerfile
    container_name: claw-routing-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4004:4004'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4004/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  memory-service:
    build:
      context: .
      dockerfile: apps/claw-memory-service/Dockerfile
    container_name: claw-memory-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4005:4005'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4005/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  file-service:
    build:
      context: .
      dockerfile: apps/claw-file-service/Dockerfile
    container_name: claw-file-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4006:4006'
    volumes:
      - file-storage-data:/data/files
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4006/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  audit-service:
    build:
      context: .
      dockerfile: apps/claw-audit-service/Dockerfile
    container_name: claw-audit-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4007:4007'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4007/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  ollama-service:
    build:
      context: .
      dockerfile: apps/claw-ollama-service/Dockerfile
    container_name: claw-ollama-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4008:4008'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4008/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  client-logs-service:
    build:
      context: .
      dockerfile: apps/claw-client-logs-service/Dockerfile
    container_name: claw-client-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4010:4010'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4010/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  server-logs-service:
    build:
      context: .
      dockerfile: apps/claw-server-logs-service/Dockerfile
    container_name: claw-server-logs-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4011:4011'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4011/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  health-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-health-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '4009:4009'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4009/api/v1/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: claw-nginx
    restart: unless-stopped
    ports:
      - '4000:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      connector-service:
        condition: service_healthy
      routing-service:
        condition: service_healthy
      memory-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      ollama-service:
        condition: service_healthy
      client-logs-service:
        condition: service_healthy
      server-logs-service:
        condition: service_healthy
      health-service:
        condition: service_healthy
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/claw-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: claw-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - nginx
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - claw-network

volumes:
  file-storage-data:
    driver: local

networks:
  claw-network:
    external: true
    name: claw-network
