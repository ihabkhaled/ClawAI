# docker-compose.ollama.yml — Ollama LLM Runtime
# Usage: docker compose -f docker-compose.ollama.yml up -d
# Usage: ./scripts/claw.sh ollama:up
# Auto-pulls tinyllama on first start for immediate dev use.
# Requires: docker-compose.databases.yml running first (claw-network must exist)
#
# Reads environment variables from the root .env file.
# Copy .env.example to .env before running.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        # Start ollama serve in the background
        ollama serve &
        SERVE_PID=$$!

        # Wait for Ollama to be ready
        echo "Waiting for Ollama to start..."
        until ollama list > /dev/null 2>&1; do
          sleep 1
        done
        echo "Ollama is ready."

        # Auto-pull all required models (skips if already installed)
        for MODEL in tinyllama gemma3:4b gemma2:2b phi3:mini llama3.2:3b; do
          if ! ollama list | grep -q "$${MODEL%%:*}"; then
            echo "Pulling $$MODEL..."
            ollama pull $$MODEL
            echo "$$MODEL pulled successfully."
          else
            echo "$$MODEL already available."
          fi
        done

        echo "All models ready."

        # Keep the container running by waiting on the serve process
        wait $$SERVE_PID
    healthcheck:
      test: ['CMD-SHELL', 'ollama list > /dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - claw-network

  # ---------------------------------------------------------------------------
  # Stable Diffusion (Local Image Generation)
  # ---------------------------------------------------------------------------
  stable-diffusion:
    image: ghcr.io/ai-dock/stable-diffusion-webui:latest
    container_name: claw-stable-diffusion
    restart: unless-stopped
    ports:
      - '7860:7860'
    volumes:
      - sd-models-data:/opt/stable-diffusion-webui/models
    environment:
      - COMMANDLINE_ARGS=--api --nowebui --listen --skip-torch-cuda-test
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:7860/sdapi/v1/sd-models 2>/dev/null || exit 1']
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - claw-network

volumes:
  ollama-data:
  sd-models-data:

networks:
  claw-network:
    external: true
    name: claw-network
